<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Monise Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout" id="admin-layout"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/admin/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await requireAdmin();
      if (!user) return;
      document.getElementById('admin-layout').innerHTML = `
        ${renderAdminNav('dashboard')}
        <main class="admin-main">
          <div class="admin-header"><h1>Dashboard</h1><span>Hi, ${user.name}</span></div>
          <div class="stats-grid" id="stats"></div>
          <div class="card" style="padding:20px;margin-bottom:24px">
            <h3>Revenue (Last 30 Days)</h3>
            <div id="revenue-chart"></div>
          </div>
          <div style="display:grid;gap:24px">
            <div class="card" style="padding:20px">
              <h3>Recent Orders</h3>
              <div id="recent-orders"></div>
            </div>
            <div class="card" style="padding:20px">
              <h3>Low Stock Alerts</h3>
              <div id="low-stock"></div>
            </div>
          </div>
        </main>`;
      initAdminLogout();
      const data = await AdminAPI.get('/dashboard');
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="value">${data.stats.todayOrders}</div><div class="label">Today's Orders</div></div>
        <div class="stat-card"><div class="value">${formatZAR(data.stats.monthRevenue)}</div><div class="label">Month Revenue</div></div>
        <div class="stat-card"><div class="value">${data.stats.lowStockCount}</div><div class="label">Low Stock</div></div>
        <div class="stat-card"><div class="value">${data.stats.newCustomers}</div><div class="label">New Customers (7d)</div></div>`;
      renderBarChart(data.revenueChart, 'revenue-chart');
      document.getElementById('recent-orders').innerHTML = `
        <table class="data-table"><tr><th>Order</th><th>Total</th><th>Status</th><th>Action</th></tr>
        ${data.recentOrders.map((o) => `
          <tr><td>${o.order_number}</td><td>${formatZAR(o.total)}</td>
          <td><select class="status-update" data-id="${o.id}">
            ${['pending','confirmed','packed','dispatched','delivered'].map((s) =>
              `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
          </select></td>
          <td><a href="/admin/orders.html?id=${o.id}">View</a></td></tr>`).join('')}
        </table>`;
      document.querySelectorAll('.status-update').forEach((sel) => {
        sel.addEventListener('change', async () => {
          await AdminAPI.patch(`/orders/${sel.dataset.id}/status`, { status: sel.value });
        });
      });
      document.getElementById('low-stock').innerHTML = data.lowStock.length ?
        `<table class="data-table"><tr><th>Product</th><th>Stock</th></tr>
        ${data.lowStock.map((p) => `<tr><td>${p.name}</td><td>${p.stock_qty}</td></tr>`).join('')}</table>` :
        '<p>All stock levels OK</p>';
    });
  </script>
</body>
</html>
