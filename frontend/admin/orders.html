<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Monise Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout" id="layout"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/admin/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await requireAdmin()) return;
      document.getElementById('layout').innerHTML = `
        ${renderAdminNav('orders')}
        <main class="admin-main">
          <div class="admin-header">
            <h1>Orders</h1>
            <a href="/api/admin/orders/export/csv" class="btn btn-outline">Export CSV</a>
          </div>
          <div id="orders-list"></div>
          <div id="order-detail" class="card hidden" style="padding:20px;margin-top:20px"></div>
        </main>`;
      initAdminLogout();
      loadOrders();
      const id = new URLSearchParams(location.search).get('id');
      if (id) viewOrder(id);
    });

    async function loadOrders() {
      const { orders } = await AdminAPI.get('/orders');
      document.getElementById('orders-list').innerHTML = `
        <table class="data-table">
          <tr><th>Order #</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Payment</th><th></th></tr>
          ${orders.map((o) => `<tr>
            <td>${o.order_number}</td>
            <td>${o.guest_name || '—'}</td>
            <td>${new Date(o.created_at).toLocaleDateString('en-ZA')}</td>
            <td>${formatZAR(o.total)}</td>
            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
            <td>${o.payment_status}</td>
            <td><button class="btn btn-sm btn-primary" onclick="viewOrder(${o.id})">View</button></td>
          </tr>`).join('')}
        </table>`;
    }

    async function viewOrder(id) {
      const { order, items, customer } = await AdminAPI.get(`/orders/${id}`);
      const el = document.getElementById('order-detail');
      el.classList.remove('hidden');
      el.innerHTML = `
        <h3>Order ${order.order_number}</h3>
        <p><strong>${order.guest_name}</strong> | ${order.guest_email} | ${order.guest_phone}</p>
        <p>Delivery: ${order.delivery_type} — ${order.delivery_address}</p>
        <table class="data-table"><tr><th>Item</th><th>Qty</th><th>Price</th></tr>
        ${items.map((i) => `<tr><td>${i.product_name}</td><td>${i.quantity}</td><td>${formatZAR(i.unit_price)}</td></tr>`).join('')}
        </table>
        <p><strong>Total: ${formatZAR(order.total)}</strong></p>
        <div class="form-group">
          <label>Update Status</label>
          <select id="order-status">
            ${['pending','confirmed','packed','dispatched','delivered','cancelled'].map((s) =>
              `<option value="${s}" ${order.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Internal Notes</label><textarea id="internal-notes" rows="2">${order.internal_notes || ''}</textarea></div>
        <button class="btn btn-primary" onclick="updateOrder(${order.id})">Save</button>
        <a href="${whatsappUrl(`Hi ${order.guest_name}, update on order ${order.order_number}: `)}" class="btn btn-whatsapp" target="_blank">Notify via WhatsApp</a>`;
    }

    async function updateOrder(id) {
      await AdminAPI.patch(`/orders/${id}/status`, {
        status: document.getElementById('order-status').value,
        internal_notes: document.getElementById('internal-notes').value
      });
      alert('Order updated');
      loadOrders();
    }
  </script>
</body>
</html>
