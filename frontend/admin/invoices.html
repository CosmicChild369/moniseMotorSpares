<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices | Monise Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout" id="layout"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/admin/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await requireAdmin()) return;
      document.getElementById('layout').innerHTML = `
        ${renderAdminNav('invoices')}
        <main class="admin-main">
          <h1>Invoice & Quote Generator</h1>
          <form id="invoice-form" class="card" style="padding:20px;max-width:600px">
            <div class="form-group"><label>Customer Name</label><input name="customer_name" required></div>
            <div class="form-group"><label>Email</label><input name="customer_email" type="email"></div>
            <div class="form-group"><label>Phone</label><input name="customer_phone"></div>
            <div class="form-group"><label>Description / Item</label><input id="item-desc" placeholder="Product description"></div>
            <div class="form-row form-row-2">
              <input id="item-qty" type="number" value="1" placeholder="Qty">
              <input id="item-price" type="number" step="0.01" placeholder="Unit price">
              <button type="button" class="btn btn-outline" onclick="addLine()">Add Line</button>
            </div>
            <ul id="lines"></ul>
            <div class="form-group"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary">Generate Invoice PDF</button>
          </form>
          <div id="invoices-list" style="margin-top:24px"></div>
        </main>`;
      initAdminLogout();
      window.lines = [];
      const { invoices } = await AdminAPI.get('/invoices');
      document.getElementById('invoices-list').innerHTML = invoices.length ?
        `<table class="data-table"><tr><th>Invoice #</th><th>Customer</th><th>Total</th><th>Status</th></tr>
        ${invoices.map((i) => `<tr><td>${i.invoice_number}</td><td>${i.customer_name}</td><td>${formatZAR(i.total)}</td><td>${i.status}</td></tr>`).join('')}
        </table>` : '';
      document.getElementById('invoice-form').onsubmit = async (e) => {
        e.preventDefault();
        if (!window.lines.length) { alert('Add at least one line item'); return; }
        const fd = new FormData(e.target);
        const r = await AdminAPI.post('/invoices', {
          customer_name: fd.get('customer_name'),
          customer_email: fd.get('customer_email'),
          customer_phone: fd.get('customer_phone'),
          notes: fd.get('notes'),
          items: window.lines
        });
        alert(`Invoice ${r.invoice_number} created`);
        location.reload();
      };
    });
    function addLine() {
      const desc = document.getElementById('item-desc').value;
      const qty = Number(document.getElementById('item-qty').value);
      const price = Number(document.getElementById('item-price').value);
      if (!desc || !price) return;
      window.lines.push({ description: desc, quantity: qty, unit_price: price });
      document.getElementById('lines').innerHTML = window.lines.map((l, i) =>
        `<li>${l.description} x${l.quantity} @ ${formatZAR(l.unit_price)}</li>`).join('');
    }
  </script>
</body>
</html>
