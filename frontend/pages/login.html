<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section" style="max-width:400px">
    <h1 class="section-title">Login</h1>
    <div id="alert-box"></div>
    <form id="login-form" class="card" style="padding:24px">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
      <p style="margin-top:16px;font-size:14px;text-align:center">
        <a href="/pages/forgot-password.html">Forgot password?</a><br>
        <a href="/pages/register.html">Create account</a>
      </p>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        try {
          const { user } = await AuthAPI.login(fd.get('email'), fd.get('password'));
          if (['staff', 'super_admin'].includes(user.role)) {
            window.location.href = '/admin/';
          } else {
            window.location.href = '/pages/account.html';
          }
        } catch (err) {
          showAlert(document.getElementById('alert-box'), err.message);
        }
      });
    });
  </script>
</body>
</html>
