<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Parts | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section">
    <div id="category-hero" class="hidden" style="margin-bottom:16px"></div>
    <h1 class="section-title" id="page-title">All Parts</h1>
    <div class="listing-layout">
      <aside class="sidebar-filters">
        <h3>Filters</h3>
        <div class="filter-group">
          <label>Category</label>
          <select id="filter-category"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Brand</label>
          <select id="filter-brand"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Price: <span id="price-label">R0 - R5000</span></label>
          <input type="range" id="filter-price" class="price-range" min="0" max="5000" value="5000">
        </div>
        <div class="filter-group">
          <label><input type="checkbox" id="filter-stock"> In stock only</label>
        </div>
        <div class="filter-group">
          <label>Sort</label>
          <select id="filter-sort">
            <option value="newest">Newest</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" id="apply-filters">Apply Filters</button>
      </aside>
      <div>
        <div class="grid-3" id="products-grid"><div class="loading">Loading products...</div></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/category-images.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/vehicle-selector.js"></script>
  <script>
    let currentPage = 1;
    let currentProducts = [];
    const limit = 12;

    document.addEventListener('DOMContentLoaded', async () => {
      initLayout();
      await loadFilterOptions();
      const cat = getParam('category');
      const search = getParam('search');
      if (cat) {
        document.getElementById('filter-category').value = cat;
        const title = cat.replace(/-/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
        document.getElementById('page-title').textContent = title;
        const img = getCategoryImage(cat);
        const hero = document.getElementById('category-hero');
        hero.classList.remove('hidden');
        hero.innerHTML = `
          <div class="card" style="display:flex;align-items:center;gap:16px;padding:12px;flex-wrap:wrap">
            <img src="${img}" alt="${title}" style="width:120px;height:90px;object-fit:cover;border-radius:6px">
            <div><h2 style="color:var(--primary);font-size:1.1rem;margin:0">${title}</h2>
            <p style="font-size:13px;color:var(--text-muted);margin:4px 0 0">Browse parts in this category</p></div>
          </div>`;
      }
      if (search) document.querySelector('.search-bar input').value = search;
      document.getElementById('filter-price').addEventListener('input', (e) => {
        document.getElementById('price-label').textContent = `R0 - R${e.target.value}`;
      });
      document.getElementById('apply-filters').addEventListener('click', () => { currentPage = 1; loadProducts(); });
      window.refreshProducts = () => { currentPage = 1; loadProducts(); };
      window.addEventListener('vehicle-selected', window.refreshProducts);
      loadProducts();
    });

    async function loadFilterOptions() {
      const [cats, brands] = await Promise.all([CategoriesAPI.list(), ProductsAPI.brands()]);
      const catSel = document.getElementById('filter-category');
      cats.categories.forEach((c) => {
        catSel.innerHTML += `<option value="${c.slug}">${c.name}</option>`;
      });
      const brandSel = document.getElementById('filter-brand');
      brands.brands.forEach((b) => {
        brandSel.innerHTML += `<option value="${b}">${b}</option>`;
      });
    }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="loading">Loading...</div>';
      const params = {
        page: currentPage,
        limit,
        category: document.getElementById('filter-category').value,
        brand: document.getElementById('filter-brand').value,
        maxPrice: document.getElementById('filter-price').value,
        inStock: document.getElementById('filter-stock').checked ? 'true' : '',
        sort: document.getElementById('filter-sort').value,
        search: getParam('search') || '',
        ...vehicleFilterParams()
      };
      Object.keys(params).forEach((k) => !params[k] && delete params[k]);
      try {
        const data = await ProductsAPI.list(params);
        currentProducts = data.products;
        if (!data.products.length) {
          grid.innerHTML = '<p>No products found. Try clearing your vehicle filter.</p>';
          return;
        }
        grid.innerHTML = data.products.map((p) => productCardHTML(p)).join('');
        bindAddToCart(grid, data.products);
        renderPagination(data.total, data.page, data.limit);
      } catch (e) {
        grid.innerHTML = `<p class="alert alert-error">${e.message}</p>`;
      }
    }

    function renderPagination(total, page, lim) {
      const pages = Math.ceil(total / lim);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= pages; i++) {
        html += `<button class="${i === page ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      el.innerHTML = html;
      el.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', () => {
          currentPage = Number(btn.dataset.page);
          loadProducts();
          window.scrollTo(0, 0);
        });
      });
    }
  </script>
</body>
</html>
