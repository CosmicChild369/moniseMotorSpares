<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section" style="text-align:center;max-width:500px">
    <div class="card" style="padding:32px">
      <div style="font-size:48px;color:var(--success)">✓</div>
      <h1 class="section-title">Thank You!</h1>
      <p>Your order has been placed successfully.</p>
      <p style="font-size:1.25rem;font-weight:700;color:var(--primary);margin:16px 0" id="order-num"></p>
      <p>A confirmation email has been sent (if SMTP is configured).</p>
      <a href="/pages/track-order.html" class="btn btn-primary btn-block" style="margin:8px 0">Track Your Order</a>
      <a href="/pages/products.html" class="btn btn-outline btn-block">Continue Shopping</a>
      <a href="#" id="wa-link" class="btn btn-whatsapp btn-block" style="margin-top:8px" target="_blank">WhatsApp Support</a>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      const order = getParam('order');
      document.getElementById('order-num').textContent = `Order #${order}`;
      document.getElementById('wa-link').href = whatsappUrl(`Hi, I placed order ${order} and need assistance.`);
    });
  </script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>
