<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section" style="max-width:400px">
    <h1 class="section-title">Reset Password</h1>
    <form id="reset-form" class="card" style="padding:24px">
      <div class="form-group"><label>New Password</label><input type="password" name="password" minlength="6" required></div>
      <button type="submit" class="btn btn-primary btn-block">Update Password</button>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      const token = getParam('token');
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await AuthAPI.resetPassword(token, new FormData(e.target).get('password'));
        alert('Password updated! Please login.');
        window.location.href = '/pages/login.html';
      });
    });
  </script>
</body>
</html>
