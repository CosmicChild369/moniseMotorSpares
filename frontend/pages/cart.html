<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section">
    <h1 class="section-title">Shopping Cart</h1>
    <div class="cart-layout">
      <div id="cart-items"></div>
      <div class="order-summary" id="order-summary"></div>
    </div>
  </main>
  <div id="site-footer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/vehicle-selector.js"></script>
  <script>
    let discount = 0;
    let deliveryType = 'standard';

    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      renderCart();
      window.addEventListener('cart-updated', renderCart);
    });

    function renderCart() {
      const cart = getCart();
      const itemsEl = document.getElementById('cart-items');
      if (!cart.length) {
        itemsEl.innerHTML = '<p>Your cart is empty. <a href="/pages/products.html">Continue shopping</a></p>';
        document.getElementById('order-summary').innerHTML = '';
        return;
      }
      itemsEl.innerHTML = cart.map((item) => `
        <div class="cart-item">
          <img src="${item.image}" alt="" style="width:80px;height:80px;object-fit:contain">
          <div>
            <strong>${item.name}</strong>
            <p style="font-size:13px;color:var(--text-muted)">SKU: ${item.sku}</p>
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <button class="btn btn-sm btn-outline qty-minus" data-id="${item.product_id}">−</button>
              <span>${item.quantity}</span>
              <button class="btn btn-sm btn-outline qty-plus" data-id="${item.product_id}">+</button>
            </div>
          </div>
          <div style="text-align:right">
            <div>${formatZAR(item.price * item.quantity)}</div>
            <button class="btn btn-sm btn-danger remove-item" data-id="${item.product_id}" style="margin-top:8px">Remove</button>
          </div>
        </div>`).join('');

      itemsEl.querySelectorAll('.qty-minus').forEach((b) => {
        b.addEventListener('click', () => {
          const item = cart.find((i) => i.product_id === Number(b.dataset.id));
          updateQuantity(item.product_id, item.quantity - 1);
        });
      });
      itemsEl.querySelectorAll('.qty-plus').forEach((b) => {
        b.addEventListener('click', () => {
          const item = cart.find((i) => i.product_id === Number(b.dataset.id));
          updateQuantity(item.product_id, item.quantity + 1);
        });
      });
      itemsEl.querySelectorAll('.remove-item').forEach((b) => {
        b.addEventListener('click', () => removeFromCart(Number(b.dataset.id)));
      });

      renderSummary();
    }

    function renderSummary() {
      const t = calcTotals(deliveryType, discount);
      document.getElementById('order-summary').innerHTML = `
        <h3>Order Summary</h3>
        <div class="row"><span>Subtotal</span><span>${formatZAR(t.subtotal)}</span></div>
        <div class="form-group" style="margin:16px 0">
          <label>Delivery</label>
          <select id="delivery-type">
            <option value="standard">Standard (3-5 days) - R89.00</option>
            <option value="express">Express (next day) - R149.00</option>
            <option value="collection">Collect in store (Katlehong) - FREE</option>
          </select>
        </div>
        <div class="row"><span>Delivery</span><span>${formatZAR(t.deliveryFee)}</span></div>
        <div class="row"><span>VAT (15%)</span><span>${formatZAR(t.vat)}</span></div>
        ${discount ? `<div class="row"><span>Discount</span><span>-${formatZAR(discount)}</span></div>` : ''}
        <div class="row total"><span>Total</span><span>${formatZAR(t.total)}</span></div>
        <div class="form-group">
          <input type="text" id="promo-code" placeholder="Promo code">
          <button class="btn btn-outline btn-sm btn-block" id="apply-promo" style="margin-top:8px">Apply</button>
        </div>
        <a href="/pages/checkout.html" class="btn btn-primary btn-block" style="margin-top:16px">Checkout</a>
        <a href="/pages/products.html" class="btn btn-outline btn-block" style="margin-top:8px">Continue Shopping</a>`;

      document.getElementById('delivery-type').value = deliveryType;
      document.getElementById('delivery-type').addEventListener('change', (e) => {
        deliveryType = e.target.value;
        localStorage.setItem('mms_delivery', deliveryType);
        renderSummary();
      });
      document.getElementById('apply-promo').addEventListener('click', async () => {
        const code = document.getElementById('promo-code').value;
        try {
          const r = await OrdersAPI.validatePromo(code, getCartSubtotal());
          discount = r.discount;
          localStorage.setItem('mms_promo', code);
          renderSummary();
          alert('Promo applied!');
        } catch (e) { alert(e.message); }
      });
    }
  </script>
</body>
</html>
