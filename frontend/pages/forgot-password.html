<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section" style="max-width:400px">
    <h1 class="section-title">Forgot Password</h1>
    <form id="forgot-form" class="card" style="padding:24px">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await AuthAPI.forgotPassword(new FormData(e.target).get('email'));
        alert('If that email exists, a reset link was sent. Check your inbox.');
      });
    });
  </script>
</body>
</html>
