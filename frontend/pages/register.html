<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Monise Motor Spares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container section" style="max-width:400px">
    <h1 class="section-title">Create Account</h1>
    <div id="alert-box"></div>
    <form id="register-form" class="card" style="padding:24px">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" minlength="6" required></div>
      <button type="submit" class="btn btn-primary btn-block">Register</button>
      <p style="margin-top:16px;text-align:center"><a href="/pages/login.html">Already have an account?</a></p>
    </form>
  </main>
  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLayout();
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        try {
          await AuthAPI.register({
            name: fd.get('name'), email: fd.get('email'),
            phone: fd.get('phone'), password: fd.get('password')
          });
          window.location.href = '/pages/account.html';
        } catch (err) {
          showAlert(document.getElementById('alert-box'), err.message);
        }
      });
    });
  </script>
</body>
</html>
